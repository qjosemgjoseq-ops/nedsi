name: DOT-NL occupancy snapshot

# Runs every 15 minutes so dotnl_occupancy_snapshots keeps accumulating real
# occupancy history in the cloud (Neon), without needing any machine left on.
# Free on a public repo: GitHub Actions minutes are unmetered there.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements-snapshot.txt

      - name: Take snapshot
        working-directory: scripts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python snapshot_dotnl_occupancy.py
